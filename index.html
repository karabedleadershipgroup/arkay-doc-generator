<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Arkay Document Generator</title>
<script src="https://cdn.jsdelivr.net/npm/pizzip@3.1.6/dist/pizzip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docxtemplater@3.47.3/build/docxtemplater.js"></script>
<style>
:root { --green:#6DBE45; --green-dark:#143608; --black:#141414; --paper:#F7F7F5; --light:#F1F8EC; --border:#D9EBC9; }
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; background:var(--paper); color:var(--black); font-size:16px; }
header { background:var(--black); padding:14px 16px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:50; }
header img { height:44px; background:#fff; border-radius:6px; padding:3px 8px; }
header .htitle { color:#fff; font-weight:700; font-size:15px; line-height:1.2; }
header .htitle span { color:var(--green); display:block; font-size:11px; font-weight:600; letter-spacing:.5px; }
.tabs { display:flex; background:var(--black); padding:0 8px 10px; gap:8px; position:sticky; top:72px; z-index:49; }
.tabs button { flex:1; padding:10px; border:none; border-radius:8px; background:#2a2a2a; color:#bbb; font-weight:700; font-size:14px; }
.tabs button.active { background:var(--green); color:var(--green-dark); }
main { max-width:760px; margin:0 auto; padding:16px 14px 90px; }
.card { background:#fff; border:1px solid #e5e5e2; border-radius:12px; padding:16px; margin-bottom:14px; }
.card h3 { background:var(--black); color:#fff; font-size:13px; letter-spacing:.8px; padding:8px 12px; border-radius:6px; margin:-4px 0 14px; text-transform:uppercase; }
label { display:block; font-size:13px; font-weight:700; margin:12px 0 4px; color:#333; }
input, select, textarea { width:100%; padding:12px; border:1.5px solid #ccc; border-radius:8px; font-size:16px; font-family:inherit; background:#fff; }
input:focus, select:focus, textarea:focus { outline:none; border-color:var(--green); }
textarea { min-height:140px; line-height:1.5; font-size:15px; }
.wq { margin-top:12px; }
.wl { font-size:13px; font-weight:700; color:#333; margin-bottom:5px; }
.wopts { display:flex; flex-wrap:wrap; gap:7px; }
.wchip { padding:9px 13px; border:1.5px solid #ccc; background:#fff; border-radius:20px; font-size:13.5px; font-weight:600; color:#444; }
.wchip.on { background:var(--green); border-color:var(--green); color:var(--green-dark); }
.scopebar { display:flex; gap:6px; margin:12px 0 6px; flex-wrap:wrap; }
.scopebar button { padding:9px 13px; border:1.5px solid var(--black); background:#fff; border-radius:8px; font-weight:700; font-size:13px; }
.scopebar button:active { background:var(--green); color:var(--green-dark); }
.scopeedit { min-height:340px; border:1.5px solid #ccc; border-radius:8px; padding:14px 12px; background:#fff; font-size:14.5px; line-height:1.55; outline:none; }
.scopeedit:focus { border-color:var(--green); }
.scopeedit .lh { font-weight:800; margin:12px 0 5px; }
.scopeedit .lh::before { content:"● "; color:var(--green); }
.scopeedit .lm { margin-left:28px; text-indent:-14px; margin-bottom:2px; }
.scopeedit .lm::before { content:"•\00a0\00a0"; }
.scopeedit .ls { margin-left:84px; text-indent:-17px; }
.scopeedit .ls::before { content:"o\00a0\00a0"; }
.scopeedit .lg { min-height:11px; }
.row { display:flex; gap:10px; } .row > * { flex:1; }
.toggle { display:flex; border:2px solid var(--black); border-radius:10px; overflow:hidden; }
.toggle button { flex:1; padding:13px; border:none; background:#fff; font-weight:800; font-size:15px; color:#777; }
.toggle button.on { background:var(--black); color:var(--green); }
.chips { display:flex; flex-wrap:wrap; gap:8px; margin-top:6px; }
.chips button { padding:8px 12px; border:1.5px solid var(--border); background:var(--light); border-radius:20px; font-size:13px; font-weight:600; color:var(--green-dark); }
.chips button:active { background:var(--green); color:#fff; }
.btn { width:100%; padding:15px; border:none; border-radius:10px; font-size:16px; font-weight:800; margin-top:10px; }
.btn-green { background:var(--green); color:var(--green-dark); }
.btn-black { background:var(--black); color:#fff; }
.btn-outline { background:#fff; border:2px solid var(--black); color:var(--black); }
.btn:disabled { opacity:.5; }
.mic { display:flex; align-items:center; gap:10px; padding:13px; border-radius:10px; border:2px dashed var(--green); background:var(--light); width:100%; font-weight:700; color:var(--green-dark); font-size:15px; }
.mic.rec { background:#fde8e8; border-color:#d33; color:#a00; animation:pulse 1.2s infinite; }
@keyframes pulse { 50% { opacity:.6; } }
.intel { background:var(--light); border:1px solid var(--border); border-radius:10px; padding:12px; font-size:13px; margin-top:8px; }
.intel b { color:var(--green-dark); }
.intel .rec { color:#555; margin-top:4px; }
.status { position:fixed; bottom:0; left:0; right:0; background:var(--black); color:var(--green); text-align:center; padding:12px; font-weight:700; font-size:14px; display:none; z-index:99; }
table.hist { width:100%; border-collapse:collapse; font-size:13px; }
table.hist td, table.hist th { padding:9px 6px; border-bottom:1px solid #eee; text-align:left; }
table.hist th { background:var(--light); color:var(--green-dark); font-size:11px; text-transform:uppercase; }
.pill { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:700; }
.pill.P { background:var(--light); color:var(--green-dark); } .pill.I { background:#141414; color:var(--green); }
.stats { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.stat { background:var(--black); color:#fff; border-radius:10px; padding:14px; }
.stat .n { font-size:22px; font-weight:800; color:var(--green); } .stat .l { font-size:11px; color:#aaa; text-transform:uppercase; letter-spacing:.5px; }
#gate { position:fixed; inset:0; background:var(--black); z-index:200; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; }
#gate img { width:240px; background:#fff; border-radius:10px; padding:14px 20px; margin-bottom:24px; }
#gate input { max-width:320px; text-align:center; font-size:18px; }
#gate .btn { max-width:320px; }
#gate p { color:#888; font-size:12px; margin-top:16px; }
/* Document preview (also the PDF source) */
#docPreview { background:#fff; padding:34px 30px; border:1px solid #ddd; font-family:Arial,Helvetica,sans-serif; color:#141414; font-size:12.5px; line-height:1.5; }
#docPreview .dhead { display:flex; gap:18px; align-items:center; margin-bottom:10px; }
#docPreview .dhead img { width:170px; }
#docPreview .dtitle { font-size:26px; font-weight:800; }
#docPreview .dsub { color:var(--green); font-size:15px; }
#docPreview .addr { border-bottom:1px solid #ccc; padding-bottom:8px; margin-bottom:14px; display:flex; justify-content:space-between; font-size:11.5px; }
#docPreview table.info { width:100%; border-collapse:collapse; margin-bottom:16px; }
#docPreview table.info td { border:1px solid var(--border); padding:7px 10px; }
#docPreview table.info td:first-child { background:#EAF5E3; font-weight:700; width:170px; }
#docPreview .bar { background:var(--green); color:#fff; font-weight:800; padding:8px 12px; letter-spacing:.5px; margin:16px 0 10px; font-size:13px; }
#docPreview .box { background:var(--light); border:1px solid var(--border); padding:12px 14px; }
#docPreview .tot { display:flex; border:1px solid var(--border); background:var(--light); }
#docPreview .tot div { padding:11px 14px; } #docPreview .tot div:first-child { flex:1; font-weight:800; }
#docPreview .tot div:last-child { font-weight:800; color:var(--green); font-size:16px; }
#docPreview .note { font-style:italic; font-size:11px; margin-top:8px; color:#333; }
#docPreview .thanks { text-align:center; font-weight:800; margin:26px 0 18px; font-size:14px; }
#docPreview .thanks span { color:var(--green); }
#docPreview .badges { display:flex; justify-content:space-around; align-items:center; margin-top:8px; }
#docPreview .badges img { height:44px; }
#docPreview .dfoot { text-align:center; color:#777; font-size:9.5px; margin-top:26px; border-top:1px solid #eee; padding-top:8px; }
.hidden { display:none !important; }
</style>
</head>
<body>

<div id="gate">
  <img src="assets/logo.png" alt="Arkay Energy Solutions">
  <input type="password" id="gateCode" placeholder="Access code" autocomplete="off" onkeydown="if(event.key==='Enter')unlock()">
  <button class="btn btn-green" onclick="unlock()">Enter</button>
  <p>Arkay Energy Solutions — Document Generator</p>
</div>

<header>
  <img src="assets/logo.png" alt="Arkay">
  <div class="htitle">Document Generator<span>ARKAY ENERGY SOLUTIONS</span></div>
</header>
<div class="tabs">
  <button id="tabNew" class="active" onclick="showTab('new')">＋ New Doc</button>
  <button id="tabJobs" onclick="showTab('jobs')">Jobs</button>
  <button id="tabDash" onclick="showTab('dash')">Reports</button>
</div>

<main>
<!-- ============ NEW DOC ============ -->
<section id="viewNew">
  <div class="card">
    <div class="toggle">
      <button id="tgP" class="on" onclick="setDocType('Proposal')">PROPOSAL</button>
      <button id="tgI" onclick="setDocType('Invoice')">INVOICE</button>
    </div>
    <div class="row" style="margin-top:12px">
      <div><label>Doc No.</label><input id="fNum" inputmode="numeric"></div>
      <div><label>Date</label><input id="fDate" type="date"></div>
    </div>
    <label>Job Type</label>
    <select id="fJobType" onchange="applyTemplate()">
      <option value="">— Select to auto-fill scope —</option>
    </select>
    <div id="wizard" class="hidden"></div>
    <button id="wizBuild" class="btn btn-green hidden" onclick="wizardBuild()">⚙ Build Scope from Answers</button>
    <div id="intel" class="intel hidden"></div>
  </div>

  <div class="card">
    <h3>Client & Property</h3>
    <label>Client Name</label><input id="fClient" placeholder="e.g. Brooke Shaw Builders">
    <label>Property Address</label><input id="fAddr" placeholder="e.g. 855 Park Drive">
    <div class="row">
      <div><label>City</label><input id="fCity" placeholder="e.g. Mountain View"></div>
      <div><label>Investment ($)</label><input id="fAmount" inputmode="decimal" placeholder="0.00"></div>
    </div>
  </div>

  <div class="card">
    <h3>Scope of Work</h3>
    <button class="mic" id="micBtn" onclick="toggleMic()">🎤 <span id="micLabel">Dictate from the job site — AI drafts it in Arkay style</span></button>
    <div id="obsWrap" class="hidden">
      <label>Observation & Recommendation (repair proposals)</label>
      <textarea id="fObs" style="min-height:110px"></textarea>
    </div>
    <label>Scope <span id="scopeLang" style="color:var(--green)"></span></label>
    <div style="font-size:12px;color:#888;margin:0 0 6px">Tap a line, then a style button. Select words, then <b>B</b> or <i>I</i>.</div>
    <div class="scopebar">
      <button type="button" onclick="setLine('head')">● Header</button>
      <button type="button" onclick="setLine('main')">• Bullet</button>
      <button type="button" onclick="setLine('sub')">&nbsp;&nbsp;o Sub</button>
      <button type="button" onclick="fmt('bold')" style="font-weight:800">B</button>
      <button type="button" onclick="fmt('italic')" style="font-style:italic;font-family:Georgia">I</button>
    </div>
    <div id="fScope" class="scopeedit" contenteditable="true"></div>
    <div class="row">
      <button class="btn btn-outline" onclick="translateScope()">🇪🇸 Español</button>
      <button class="btn btn-outline" onclick="draftFromNotes()">✨ AI Clean-Up</button>
    </div>
  </div>

  <button class="btn btn-black" onclick="preview()">Preview Document</button>
  <div id="previewWrap" class="hidden">
    <div id="docPreview" style="margin-top:14px"></div>
    <button class="btn btn-green" onclick="generatePDF()">⬇ Generate PDF + Log</button>
    <button class="btn btn-outline" onclick="generate('docx')">⬇ Generate Word + Save to Dropbox</button>
    <button class="btn btn-black" onclick="sendDoc()">📤 Send to Client</button>
  </div>
</section>

<!-- ============ JOBS ============ -->
<section id="viewJobs" class="hidden">
  <div class="card">
    <h3>Job History</h3>
    <input id="jobSearch" placeholder="Search client, address, number…" oninput="renderJobs()">
    <div id="jobEditor" class="hidden" style="background:var(--light);border:1.5px solid var(--green);border-radius:10px;padding:12px;margin-top:10px">
      <b id="jeTitle" style="font-size:14px"></b>
      <div class="row" style="margin-top:8px">
        <div><label>Status</label><select id="jeStatus"><option value="sent">Sent / Unpaid</option><option value="accepted">Accepted</option><option value="paid">Paid</option><option value="historical">Historical</option></select></div>
        <div><label>Amount ($)</label><input id="jeAmount" inputmode="decimal"></div>
      </div>
      <label>Client</label><input id="jeClient">
      <div class="row">
        <button class="btn btn-green" onclick="jobSave()">Save</button>
        <button class="btn btn-outline" onclick="$('jobEditor').classList.add('hidden')">Cancel</button>
      </div>
      <button class="btn" style="background:#fde8e8;color:#a00;border:1.5px solid #a00" onclick="jobDelete()">🗑 Delete this job</button>
    </div>
    <div style="overflow-x:auto; margin-top:10px">
      <table class="hist"><thead><tr><th>No.</th><th>Type</th><th>Client / Address</th><th>Amount</th><th></th></tr></thead>
      <tbody id="jobsBody"></tbody></table>
    </div>
  </div>
</section>

<!-- ============ REPORTS ============ -->
<section id="viewDash" class="hidden">
  <div class="card"><h3>This Business, By the Numbers</h3>
    <div class="stats" id="statGrid"></div>
    <div id="byType" style="margin-top:14px"></div>
  </div>
</section>
</main>

<div class="status" id="statusBar"></div>

<script>

/* =============== HELPERS =============== */
const $ = (id) => document.getElementById(id);
function toast(msg, ms = 2600) { const s = $("statusBar"); s.textContent = msg; s.style.display = "block"; clearTimeout(s._t); s._t = setTimeout(() => s.style.display = "none", ms); }
async function api(path, opts = {}) {

/* =============== GATE =============== */
async function unlock() {
  ACCESS = $("gateCode").value.trim();
  try { await api("jobs?action=next-number"); sessionStorage.setItem("arkay_code", ACCESS); $("gate").style.display = "none"; init(); }
  catch { toast("Invalid access code"); }
}
if (ACCESS) { $("gate").style.display = "none"; init(); }

/* =============== INIT =============== */
async function init() {
  const sc = $("fScope");
  sc.addEventListener("input", () => normalizeEditor());
  sc.addEventListener("keyup", (e) => { if (e.key === "Enter") scopeBlocks().forEach((b) => { if (b.classList.contains("lh") && !b.innerText.trim()) b.className = "lm"; }); });
  $("fDate").value = new Date().toISOString().slice(0, 10);
  const sel = $("fJobType");
  Object.keys(TEMPLATES).forEach((k) => { const o = document.createElement("option"); o.value = o.textContent = k; sel.appendChild(o); });
  try { const { next_number } = await api("jobs?action=next-number"); $("fNum").value = next_number; } catch (e) { toast("Numbering offline: " + e.message); }
  loadJobs();
}

function setDocType(t) {
  DOC_TYPE = t;
  $("tgP").classList.toggle("on", t === "Proposal");
  $("tgI").classList.toggle("on", t === "Invoice");
}
function showTab(t) {
  ["New", "Jobs", "Dash"].forEach((x) => { $("view" + x).classList.add("hidden"); $("tab" + x).classList.remove("active"); });
  $("view" + { new: "New", jobs: "Jobs", dash: "Dash" }[t]).classList.remove("hidden");
  $("tab" + { new: "New", jobs: "Jobs", dash: "Dash" }[t]).classList.add("active");
  if (t === "dash") renderDash();
}

/* =============== TEMPLATE AUTO-FILL + PRICE INTEL =============== */
function applyTemplate() {
  const jt = $("fJobType").value;
  WA = {}; _extraNotes = [];
  renderWizard();
  const t = TEMPLATES[jt];
  if (!t) return;
  if (WIZARDS[jt]) { $("obsWrap").classList.add("hidden"); priceIntel(jt); if ($("wizard").scrollIntoView) $("wizard").scrollIntoView({ behavior: "smooth", block: "start" }); return; }
  const ton = "[TONNAGE]", sys = "[# OF UNITS]";
  const city = $("fCity").value || "[CITY]";
  const ahModel = "[AIR HANDLER MODEL]", hpModel = "[HEAT PUMP MODEL]";
  setScopeMarkers(t.scope.replaceAll("{TON}", ton).replaceAll("{CITY}", city).replaceAll("{SYS}", sys).replaceAll("{AH_MODEL}", ahModel).replaceAll("{HP_MODEL}", hpModel));
  $("obsWrap").classList.toggle("hidden", !t.obs);
  if (t.obs) $("fObs").value = t.observation;
  if (t.docTitle.includes("INVOICE")) setDocType("Invoice");
  priceIntel($("fJobType").value);
  if ($("fScope").scrollIntoView) $("fScope").scrollIntoView({ behavior: "smooth", block: "start" });
}

async function priceIntel(jobType) {
  const box = $("intel"); box.classList.remove("hidden"); box.innerHTML = "Checking similar jobs…";
  try {
    const d = await api(`jobs?action=similar&job_type=${encodeURIComponent(jobType)}`);
    if (!d.count) { box.innerHTML = "💰 No priced history for this job type yet."; return; }
    box.innerHTML = `💰 <b>${d.count} similar jobs</b> — median <b>${fmt(d.median)}</b> (range ${fmt(d.low)}–${fmt(d.high)})` +
      `<div class="rec">Recent: ${d.recent.map((r) => `${r.property_address.split(",")[0]} ${fmt(r.amount)}`).join(" · ")}</div>`;
  } catch (e) { box.innerHTML = "Price intel unavailable: " + e.message; }
}

/* =============== SCOPE ENGINE (rich editor <-> preview <-> Word) =============== */
const KCLS = { head: "lh", main: "lm", sub: "ls", gap: "lg" };
const CLSK = { lh: "head", lm: "main", ls: "sub", lg: "gap" };
function escH(s) { return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
function xesc(s) { return escH(s).replace(/"/g, "&quot;"); }

function parseInline(s) {
  const runs = [];
  for (const p of s.split(/(\*\*.+?\*\*|\*[^*]+?\*)/g).filter(Boolean)) {
    let t = p, b = false, i = false;
    if (/^\*\*.+\*\*$/.test(p)) { t = p.slice(2, -2); b = true; }
    else if (/^\*[^*]+\*$/.test(p)) { t = p.slice(1, -1); i = true; }
    runs.push({ t, b, i });
  }
  return runs;
}
function markersToLines(text) {
  return (text || "").split("\n").map((raw) => {
    const line = raw.replace(/^[·•]\s*/, "").trimEnd();
    const t = line.trim();
    if (!t) return { kind: "gap", runs: [] };
    if (/^#/.test(t)) { let h = t.replace(/^#\s*/, "").toUpperCase(); if (!h.endsWith(":")) h += ":"; return { kind: "head", runs: parseInline(h) }; }
    if (/^[^a-z]{4,}:$/.test(t)) return { kind: "head", runs: parseInline(t) };
    if (/^(-|o)\s+/.test(t)) return { kind: "sub", runs: parseInline(t.replace(/^(-|o)\s+/, "")) };
    return { kind: "main", runs: parseInline(t) };
  });
}
function runsToHtml(runs) {
  const h = runs.map((r) => { let x = escH(r.t); if (r.i) x = "<i>" + x + "</i>"; if (r.b) x = "<b>" + x + "</b>"; return x; }).join("");
  return h || "<br>";
}
function linesToEditorHtml(lines) { return lines.map((l) => `<div class="${KCLS[l.kind]}">${l.kind === "gap" ? "<br>" : runsToHtml(l.runs)}</div>`).join(""); }
function setScopeMarkers(text) { $("fScope").innerHTML = linesToEditorHtml(markersToLines(text)); }
function appendScopeMarkers(text) { $("fScope").innerHTML += linesToEditorHtml(markersToLines(text)); }
function normalizeEditor() {
  const ed = $("fScope");
  [...ed.childNodes].forEach((n) => {
    if (n.nodeType === 3) {
      if (!n.textContent.trim()) { n.remove(); return; }
      const d = document.createElement("div"); d.className = "lm"; n.replaceWith(d); d.appendChild(n);
    } else if (n.nodeType === 1) {
      if (n.tagName === "BR") { const d = document.createElement("div"); d.className = "lg"; d.innerHTML = "<br>"; n.replaceWith(d); return; }
      if (!CLSK[[...n.classList].find((c) => CLSK[c]) || ""]) n.className = "lm";
    }
  });
}
function editorToLines() {
  normalizeEditor();
  const out = [];
  [...$("fScope").children].forEach((n) => {
    const kind = CLSK[[...n.classList].find((c) => CLSK[c])] || "main";
    const runs = [];
    (function walk(node, b, i) {
      node.childNodes.forEach((c) => {
        if (c.nodeType === 3) { if (c.textContent) runs.push({ t: c.textContent, b, i }); }
        else if (c.nodeType === 1 && c.tagName !== "BR") {
          const st = c.style || {};
          walk(c, b || c.tagName === "B" || c.tagName === "STRONG" || st.fontWeight === "bold" || +st.fontWeight >= 600,
                  i || c.tagName === "I" || c.tagName === "EM" || st.fontStyle === "italic");
        }
      });
    })(n, false, false);
    const hasText = runs.some((r) => r.t.trim());
    out.push(hasText ? { kind, runs } : { kind: "gap", runs: [] });
  });
  return out;
}
function linesToMarkers(lines) {
  return lines.map((l) => {
    if (l.kind === "gap") return "";
    const txt = l.runs.map((r) => { let t = r.t; if (r.b) t = "**" + t + "**"; if (r.i) t = "*" + t + "*"; return t; }).join("");
    if (l.kind === "head") return "# " + txt.replace(/:$/, "");
    if (l.kind === "sub") return "- " + txt;
    return txt;
  }).join("\n");
}
function getScopeMarkers() { return linesToMarkers(editorToLines()); }
function linesToHtml(lines) {
  return lines.map((l, i) => {
    const prev = lines[i - 1] || {}, next = lines[i + 1] || {};
    if (l.kind === "gap") return '<div style="height:12px"></div>';
    const txt = runsToHtml(l.runs);
    if (l.kind === "head") return `<div style="font-weight:800;margin:${i ? 16 : 2}px 0 8px"><span style="color:var(--green)">●</span> ${txt}</div>`;
    if (l.kind === "sub") {
      const mt = prev.kind !== "sub" ? "margin-top:10px;" : "";
      const mb = next.kind !== "sub" ? "margin-bottom:12px;" : "margin-bottom:3px;";
      return `<div style="margin-left:104px;text-indent:-16px;${mt}${mb}">o&nbsp;&nbsp; ${txt}</div>`;
    }
    return `<div style="margin-left:46px;text-indent:-15px;margin-bottom:4px">•&nbsp;&nbsp; ${txt}</div>`;
  }).join("");
}
function runsToXml(runs) { return runs.map((r) => `<w:r><w:rPr>${r.b ? "<w:b/>" : ""}${r.i ? "<w:i/>" : ""}</w:rPr><w:t xml:space="preserve">${xesc(r.t)}</w:t></w:r>`).join(""); }
function linesToXml(lines) {
  return lines.map((l, i) => {
    const prev = lines[i - 1] || {}, next = lines[i + 1] || {};
    if (l.kind === "gap") return '<w:p><w:pPr><w:spacing w:after="120"/></w:pPr></w:p>';
    if (l.kind === "head") return `<w:p><w:pPr><w:spacing w:before="${i ? 200 : 40}" w:after="100"/></w:pPr><w:r><w:rPr><w:b/><w:color w:val="6DBE45"/></w:rPr><w:t xml:space="preserve">●  </w:t></w:r>${runsToXml(l.runs.map((r) => ({ ...r, b: true })))}</w:p>`;
    if (l.kind === "sub") {
      const before = prev.kind !== "sub" ? ' w:before="140"' : "";
      const after = next.kind !== "sub" ? "160" : "40";
      return `<w:p><w:pPr><w:ind w:left="2160" w:hanging="330"/><w:spacing${before} w:after="${after}"/></w:pPr><w:r><w:t xml:space="preserve">o    </w:t></w:r>${runsToXml(l.runs)}</w:p>`;
    }
    return `<w:p><w:pPr><w:ind w:left="1030" w:hanging="310"/><w:spacing w:after="60"/></w:pPr><w:r><w:t xml:space="preserve">•   </w:t></w:r>${runsToXml(l.runs)}</w:p>`;
  }).join("") || "<w:p/>";
}

function scopeBlocks() {
  const sel = window.getSelection(); if (!sel.rangeCount) return [];
  const ed = $("fScope");
  const blk = (n) => { while (n && n.parentNode !== ed) n = n.parentNode; return n; };
  let a = blk(sel.anchorNode), f = blk(sel.focusNode);
  a = a || f; f = f || a; if (!a) return [];
  const kids = [...ed.children];
  let i1 = kids.indexOf(a), i2 = kids.indexOf(f);
  if (i1 > i2) [i1, i2] = [i2, i1];
  return kids.slice(Math.max(i1, 0), i2 + 1);
}

    <div class="stat"><div class="n">${fmt(sum(unpaid))}</div><div class="l">Outstanding</div></div>`;
  const byType = {};
  ALL_JOBS.forEach((j) => { if (j.job_type) { byType[j.job_type] = byType[j.job_type] || { n: 0, v: 0 }; byType[j.job_type].n++; byType[j.job_type].v += Number(j.amount) || 0; } });
  $("byType").innerHTML = "<label>Jobs by Type</label>" + Object.entries(byType).sort((a, b) => b[1].v - a[1].v)
    .map(([k, v]) => `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee;font-size:14px"><span>${k} <span style="color:#999">(${v.n})</span></span><b>${fmt(v.v)}</b></div>`).join("");
}
</script>
</body>
</html>
