<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Arkay Document Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pizzip/3.1.6/pizzip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docxtemplater@3.47.3/build/docxtemplater.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root { --green:#6DBE45; --green-dark:#143608; --black:#141414; --paper:#F7F7F5; --light:#F1F8EC; --border:#D9EBC9; }
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; background:var(--paper); color:var(--black); font-size:16px; }
header { background:var(--black); padding:14px 16px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:50; }
header img { height:44px; background:#fff; border-radius:6px; padding:3px 8px; }
header .htitle { color:#fff; font-weight:700; font-size:15px; line-height:1.2; }
header .htitle span { color:var(--green); display:block; font-size:11px; font-weight:600; letter-spacing:.5px; }
.tabs { display:flex; background:var(--black); padding:0 8px 10px; gap:8px; position:sticky; top:72px; z-index:49; }
.tabs button { flex:1; padding:10px; border:none; border-radius:8px; background:#2a2a2a; color:#bbb; font-weight:700; font-size:14px; }
.tabs button.active { background:var(--green); color:var(--green-dark); }
main { max-width:760px; margin:0 auto; padding:16px 14px 90px; }
.card { background:#fff; border:1px solid #e5e5e2; border-radius:12px; padding:16px; margin-bottom:14px; }
.card h3 { background:var(--black); color:#fff; font-size:13px; letter-spacing:.8px; padding:8px 12px; border-radius:6px; margin:-4px 0 14px; text-transform:uppercase; }
label { display:block; font-size:13px; font-weight:700; margin:12px 0 4px; color:#333; }
input, select, textarea { width:100%; padding:12px; border:1.5px solid #ccc; border-radius:8px; font-size:16px; font-family:inherit; background:#fff; }
input:focus, select:focus, textarea:focus { outline:none; border-color:var(--green); }
textarea { min-height:170px; line-height:1.45; font-size:14px; }
.row { display:flex; gap:10px; } .row > * { flex:1; }
.toggle { display:flex; border:2px solid var(--black); border-radius:10px; overflow:hidden; }
.toggle button { flex:1; padding:13px; border:none; background:#fff; font-weight:800; font-size:15px; color:#777; }
.toggle button.on { background:var(--black); color:var(--green); }
.chips { display:flex; flex-wrap:wrap; gap:8px; margin-top:6px; }
.chips button { padding:8px 12px; border:1.5px solid var(--border); background:var(--light); border-radius:20px; font-size:13px; font-weight:600; color:var(--green-dark); }
.chips button:active { background:var(--green); color:#fff; }
.btn { width:100%; padding:15px; border:none; border-radius:10px; font-size:16px; font-weight:800; margin-top:10px; }
.btn-green { background:var(--green); color:var(--green-dark); }
.btn-black { background:var(--black); color:#fff; }
.btn-outline { background:#fff; border:2px solid var(--black); color:var(--black); }
.btn:disabled { opacity:.5; }
.mic { display:flex; align-items:center; gap:10px; padding:13px; border-radius:10px; border:2px dashed var(--green); background:var(--light); width:100%; font-weight:700; color:var(--green-dark); font-size:15px; }
.mic.rec { background:#fde8e8; border-color:#d33; color:#a00; animation:pulse 1.2s infinite; }
@keyframes pulse { 50% { opacity:.6; } }
.intel { background:var(--light); border:1px solid var(--border); border-radius:10px; padding:12px; font-size:13px; margin-top:8px; }
.intel b { color:var(--green-dark); }
.intel .rec { color:#555; margin-top:4px; }
.status { position:fixed; bottom:0; left:0; right:0; background:var(--black); color:var(--green); text-align:center; padding:12px; font-weight:700; font-size:14px; display:none; z-index:99; }
table.hist { width:100%; border-collapse:collapse; font-size:13px; }
table.hist td, table.hist th { padding:9px 6px; border-bottom:1px solid #eee; text-align:left; }
table.hist th { background:var(--light); color:var(--green-dark); font-size:11px; text-transform:uppercase; }
.pill { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:700; }
.pill.P { background:var(--light); color:var(--green-dark); } .pill.I { background:#141414; color:var(--green); }
.stats { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.stat { background:var(--black); color:#fff; border-radius:10px; padding:14px; }
.stat .n { font-size:22px; font-weight:800; color:var(--green); } .stat .l { font-size:11px; color:#aaa; text-transform:uppercase; letter-spacing:.5px; }
#gate { position:fixed; inset:0; background:var(--black); z-index:200; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; }
#gate img { width:240px; background:#fff; border-radius:10px; padding:14px 20px; margin-bottom:24px; }
#gate input { max-width:320px; text-align:center; font-size:18px; }
#gate .btn { max-width:320px; }
#gate p { color:#888; font-size:12px; margin-top:16px; }
/* Document preview (also the PDF source) */
#docPreview { background:#fff; padding:34px 30px; border:1px solid #ddd; font-family:Arial,Helvetica,sans-serif; color:#141414; font-size:12.5px; line-height:1.5; }
#docPreview .dhead { display:flex; gap:18px; align-items:center; margin-bottom:10px; }
#docPreview .dhead img { width:170px; }
#docPreview .dtitle { font-size:26px; font-weight:800; }
#docPreview .dsub { color:var(--green); font-size:15px; }
#docPreview .addr { border-bottom:1px solid #ccc; padding-bottom:8px; margin-bottom:14px; display:flex; justify-content:space-between; font-size:11.5px; }
#docPreview table.info { width:100%; border-collapse:collapse; margin-bottom:16px; }
#docPreview table.info td { border:1px solid var(--border); padding:7px 10px; }
#docPreview table.info td:first-child { background:#EAF5E3; font-weight:700; width:170px; }
#docPreview .bar { background:var(--green); color:#fff; font-weight:800; padding:8px 12px; letter-spacing:.5px; margin:16px 0 10px; font-size:13px; }
#docPreview .box { background:var(--light); border:1px solid var(--border); padding:12px 14px; white-space:pre-wrap; }
#docPreview .tot { display:flex; border:1px solid var(--border); background:var(--light); }
#docPreview .tot div { padding:11px 14px; } #docPreview .tot div:first-child { flex:1; font-weight:800; }
#docPreview .tot div:last-child { font-weight:800; color:var(--green); font-size:16px; }
#docPreview .note { font-style:italic; font-size:11px; margin-top:8px; color:#333; }
#docPreview .thanks { text-align:center; font-weight:800; margin:26px 0 18px; font-size:14px; }
#docPreview .thanks span { color:var(--green); }
#docPreview .badges { display:flex; justify-content:space-around; align-items:center; margin-top:8px; }
#docPreview .badges img { height:44px; }
#docPreview .dfoot { text-align:center; color:#777; font-size:9.5px; margin-top:26px; border-top:1px solid #eee; padding-top:8px; }
.hidden { display:none !important; }
</style>
</head>
<body>

<div id="gate">
  <img src="assets/logo.png" alt="Arkay Energy Solutions">
  <input type="password" id="gateCode" placeholder="Access code" autocomplete="off">
  <button class="btn btn-green" onclick="unlock()">Enter</button>
  <p>Arkay Energy Solutions — Document Generator</p>
</div>

<header>
  <img src="assets/logo.png" alt="Arkay">
  <div class="htitle">Document Generator<span>ARKAY ENERGY SOLUTIONS</span></div>
</header>
<div class="tabs">
  <button id="tabNew" class="active" onclick="showTab('new')">＋ New Doc</button>
  <button id="tabJobs" onclick="showTab('jobs')">Jobs</button>
  <button id="tabDash" onclick="showTab('dash')">Reports</button>
</div>

<main>
<!-- ============ NEW DOC ============ -->
<section id="viewNew">
  <div class="card">
    <div class="toggle">
      <button id="tgP" class="on" onclick="setDocType('Proposal')">PROPOSAL</button>
      <button id="tgI" onclick="setDocType('Invoice')">INVOICE</button>
    </div>
    <div class="row" style="margin-top:12px">
      <div><label>Doc No.</label><input id="fNum" inputmode="numeric"></div>
      <div><label>Date</label><input id="fDate" type="date"></div>
    </div>
    <label>Job Type</label>
    <select id="fJobType" onchange="applyTemplate()">
      <option value="">— Select to auto-fill scope —</option>
    </select>
    <div id="intel" class="intel hidden"></div>
  </div>

  <div class="card">
    <h3>Client & Property</h3>
    <label>Client Name</label><input id="fClient" placeholder="e.g. Brooke Shaw Builders">
    <label>Property Address</label><input id="fAddr" placeholder="e.g. 855 Park Drive">
    <div class="row">
      <div><label>City</label><input id="fCity" placeholder="e.g. Mountain View"></div>
      <div><label>Amount ($)</label><input id="fAmount" inputmode="decimal" placeholder="0.00"></div>
    </div>
    <div class="row" id="jobFields">
      <div><label>Tonnage</label><select id="fTon"><option>—</option><option>2</option><option>2.5</option><option>3</option><option>3.5</option><option>4</option><option>5</option></select></div>
      <div><label># Systems</label><select id="fSys"><option>1</option><option>2</option><option>3</option><option>4</option></select></div>
    </div>
    <label>Equipment Quick-Picks (Bryant lineup)</label>
    <div class="chips" id="equipChips"></div>
  </div>

  <div class="card">
    <h3>Scope of Work</h3>
    <button class="mic" id="micBtn" onclick="toggleMic()">🎤 <span id="micLabel">Dictate from the job site — AI drafts it in Arkay style</span></button>
    <div id="obsWrap" class="hidden">
      <label>Observation & Recommendation (repair proposals)</label>
      <textarea id="fObs" style="min-height:110px"></textarea>
    </div>
    <label>Scope <span id="scopeLang" style="color:var(--green)"></span></label>
    <textarea id="fScope" placeholder="Pick a job type to auto-fill, dictate with the mic, or type here."></textarea>
    <div class="row">
      <button class="btn btn-outline" onclick="translateScope()">🇪🇸 Español</button>
      <button class="btn btn-outline" onclick="draftFromNotes()">✨ AI Clean-Up</button>
    </div>
  </div>

  <button class="btn btn-black" onclick="preview()">Preview Document</button>
  <div id="previewWrap" class="hidden">
    <div id="docPreview" style="margin-top:14px"></div>
    <button class="btn btn-green" onclick="generate('pdf')">⬇ Generate PDF + Save</button>
    <button class="btn btn-outline" onclick="generate('docx')">⬇ Generate Word + Save</button>
  </div>
</section>

<!-- ============ JOBS ============ -->
<section id="viewJobs" class="hidden">
  <div class="card">
    <h3>Job History</h3>
    <input id="jobSearch" placeholder="Search client, address, number…" oninput="renderJobs()">
    <div style="overflow-x:auto; margin-top:10px">
      <table class="hist"><thead><tr><th>No.</th><th>Type</th><th>Client / Address</th><th>Amount</th><th></th></tr></thead>
      <tbody id="jobsBody"></tbody></table>
    </div>
  </div>
</section>

<!-- ============ REPORTS ============ -->
<section id="viewDash" class="hidden">
  <div class="card"><h3>This Business, By the Numbers</h3>
    <div class="stats" id="statGrid"></div>
    <div id="byType" style="margin-top:14px"></div>
  </div>
</section>
</main>

<div class="status" id="statusBar"></div>

<script>
/* =============== CONFIG =============== */
const API = "/.netlify/functions";
let ACCESS = sessionStorage.getItem("arkay_code") || "";
let DOC_TYPE = "Proposal";
let ALL_JOBS = [];

/* =============== 9 SCOPE TEMPLATES — Raffie's exact language =============== */
const EQUIPMENT = [
  { label: "4-Ton Air Handler 45MUAAQ48XX3", text: "· Install a New 4-Ton, High-Efficient, Bryant Air Handler in the attic of the home\n· Model No.45MUAAQ48XX3" },
  { label: "5-Ton Air Handler 45MUAAQ60XX3", text: "· Install a New 5-Ton, High-Efficient, Bryant Air Handler in the attic of the home\n· Model No.45MUAAQ60XX3" },
  { label: "4-Ton Heat Pump 37MURAQ48", text: "· Install a New 4-Ton, High-Efficient, 15 SEER Bryant Heat Pump Condenser outside the home\n· Model No.37MURAQ48" },
  { label: "5-Ton Heat Pump 37MURAQ60", text: "· Install a New 5-Ton, High-Efficient, 15 SEER Bryant Heat Pump Condenser outside the home\n· Model No.37MURAQ60" },
  { label: "R-454B Charge", text: "· Charge the System with the New R-454B Refrigerant with Puron Advanced" },
  { label: "Mastic Seal", text: "· Seal All New Connections with Mastic, Zip-Ties, and UL Listed Tape to ensure minimal leakage" },
];

const TEMPLATES = {
"New HVAC System (Heat Pump)": { title: "HVAC Proposal", docTitle: "HVAC PROPOSAL", obs: false, scope:
`NEW AIR HANDLER, HEAT PUMP & DUCT DISTRIBUTION SYSTEM:
· Install a New Drain Pan on the HVAC Platform in the attic
· Install Air Handler Legs inside the drain pan to support the new Air Handler
· Install a New {TON}-Ton, High-Efficient, Bryant Air Handler in the attic of the home
· Model No.{AH_MODEL}
· Install a New Fusible Disconnect Box next to the new Air Handler
· Install all applicable fuses
· Install New Supply and Return Plenum onto the new Air Handler
· Install a New {TON}-Ton, High-Efficient, 15 SEER Bryant Heat Pump Condenser outside the home
· Model No.{HP_MODEL}
· Install a Line-Set running from the newly installed Air Handler to the outdoor Heat Pump
· Install a Fusible Disconnect Box on the wall next to the New Heat Pump Condenser with the proper fuses
· Ensure all exposed electrical wire is ran through conduit
· Install New Primary and Secondary Condensate Drains on the newly installed Air Handler and drain pan
· Install new supply boots through the home in the specified locations
· Install a return box in the hallway ceiling
· Install a New Return Filter Grill on the ceiling of the hallway, with a hinged door for easy access (filter included)
· Install a Newly Designed Wire-Flex Duct Distribution System throughout the attic of the home, Insulated to an R-8 Value
· Install Manual Dampers throughout the duct system to control the air distribution throughout the home, and to allow for future alterations in the amount and direction of air-flow
· Seal All New Connections with Mastic, Zip-Ties, and UL Listed Tape to ensure minimal leakage
· Run a New Communication Cable from the Air Handler in the attic to the thermostat location near the return filter grill
· Install a New Programmable Thermostat on the wall in the specified location
· Tape the perimeter of all supply and return boots to the sheetrock, with Hard-Cast Foil Grip Tape, to eliminate communication between the conditioned space and unconditioned space
· Charge the System with the New R-454B Refrigerant with Puron Advanced
· Install all New Supply Register Grills throughout the home
· Ensure all work complies with the {CITY} City Codes & Regulations

HERS CERTIFICATIONS:
· Perform the following HERS Tests and Verifications on the Newly Installed HVAC System:
· DUCT LEAKAGE
· RETURN AIR-FLOW
· WATT DRAW
· MECHANICAL VENTILATION
· Produce the following HERS Certifications for the passing HVAC System:
· CF2R MCH-01
· CF3R MCH-20
· CF3R MCH-22
· CF3R MCH-23
· CF3R MCH-27` },

"New Furnace & AC System": { title: "HVAC Proposal", docTitle: "HVAC PROPOSAL", obs: false, scope:
`NEW FURNACE, AC CONDENSER & EVAPORATOR COIL:
· Remove and dispose of the existing furnace, evaporator coil and outdoor condensing unit
· Install a New {TON}-Ton, High-Efficient, Bryant Furnace in the specified location
· Model No.[FURNACE MODEL]
· Install a New {TON}-Ton, Multi-Position, Vertically-Cased Evaporator Coil on top of the furnace
· Install a New {TON}-Ton Bryant AC Condenser outside the home
· Model No.[CONDENSER MODEL]
· Install a Line-Set running from the newly installed Evaporator Coil to the outdoor Condenser
· Install a Fusible Disconnect Box on the wall next to the New Condenser with the proper fuses
· Ensure all exposed electrical wire is ran through conduit
· Install New Primary and Secondary Condensate Drains
· Connect the new furnace to the existing gas line, exhaust venting and electrical
· Seal All New Connections with Mastic, Zip-Ties, and UL Listed Tape to ensure minimal leakage
· Install a New Programmable Thermostat on the wall in the specified location
· Charge the System with the New Refrigerant per manufacturer specification
· Ensure all work complies with the {CITY} City Codes & Regulations
· Clean up the work area and remove all debris and materials upon completion` },

"AC / Condenser & Coil Replacement": { title: "AC Replacement", docTitle: "HVAC PROPOSAL", obs: false, scope:
`NEW AC CONDENSER & COIL:
· Remove and dispose of the existing evaporator coil as well as the outdoor condensing unit
· Install a New {TON}-Ton Bryant AC Condenser outside the home
· Model No.[CONDENSER MODEL]
· Install a New {TON}-Ton, Multi-Position, Vertically-Cased Evaporator Coil
· Install a Line-Set running from the newly installed Evaporator Coil to the outdoor Condenser
· Install a Fusible Disconnect Box on the wall next to the New Condenser with the proper fuses
· Ensure all exposed electrical wire is ran through conduit
· Install New Primary and Secondary Condensate Drains
· Seal All New Connections with Mastic, Zip-Ties, and UL Listed Tape to ensure minimal leakage
· Charge the System with the New Refrigerant per manufacturer specification
· Ensure all work complies with the {CITY} City Codes & Regulations
· Clean up the work area and remove all debris and materials upon completion` },

"Ductless Mini-Split System": { title: "Ductless Mini-Split", docTitle: "HVAC PROPOSAL", obs: false, scope:
`NEW DUCTLESS HEAT PUMP MINI-SPLIT SYSTEM:
· Install {SYS} New Indoor High Wall Head(s) in the specified location(s)
· Model No.[HEAD MODEL]
· Install a New Ductless Heat Pump Condenser outside the building
· Model No.[CONDENSER MODEL]
· Install Line-Set(s) running from each indoor head to the outdoor Condenser
· Install a Fusible Disconnect Box on the wall next to the New Condenser with the proper fuses
· Ensure all exposed electrical wire is ran through conduit
· Install Condensate Drainage for each indoor head, routed to the outside of the building
· Charge the System with the New Refrigerant per manufacturer specification
· Ensure all work complies with the {CITY} City Codes & Regulations
· Clean up the work area and remove all debris and materials upon completion` },

"HVAC Repair (Observation & Recommendation)": { title: "Heat Pump Repair", docTitle: "REPAIR PROPOSAL", obs: true,
observation:
`● During our on-site visit, we found that [DESCRIBE WHAT WAS FOUND].
● Recommendation: [DESCRIBE THE RECOMMENDED FIX].
● Addressing these items now will [DESCRIBE THE BENEFIT].`,
scope:
`· [FIRST REPAIR STEP]
· [SECOND REPAIR STEP]
· Clean up the work area and remove all debris and materials upon completion` },

"Furnace Repair / Component Replacement": { title: "Furnace Repair", docTitle: "REPAIR PROPOSAL", obs: false, scope:
`MALFUNCTIONING FURNACE:
· After trouble-shooting the HVAC System, the following was determined:
· [DESCRIBE THE FINDING — e.g. the computer is burnt out and would need a conversion kit to adapt a new computer onto the older system]

· The following work will be performed:
· Remove and dispose of the malfunctioning [COMPONENT]
· Install a New [COMPONENT] onto the system
· Test the system for proper operation
· Clean up the work area and remove all debris and materials upon completion` },

"Duct Modification / Distribution Work": { title: "Ducting Modifications", docTitle: "PROPOSAL", obs: false, scope:
`NEW DUCTING MODIFICATIONS:
· Remove and dispose of the damaged sections of the existing duct distribution system
· Install new sections of duct in the specified areas, Insulated to an R-8 Value
· Make modifications to the specified supply duct(s) in order to allow proper airflow
· Install Manual Dampers where specified to control the air distribution
· Seal All New Connections with Mastic, Zip-Ties, and UL Listed Tape to ensure minimal leakage
· Ensure all work complies with the {CITY} City Codes & Regulations
· Clean up the work area and remove all debris and materials upon completion` },

"HERS Testing & Certificate Production": { title: "HERS Testing", docTitle: "HERS INVOICE", obs: false, scope:
`HERS TESTING & CERTIFICATE PRODUCTION:
· Perform the following HERS Tests and Verifications on the Newly Installed HVAC System(s):
· DUCT LEAKAGE
· RETURN AIR-FLOW
· WATT DRAW
· REFRIGERANT CHARGE
· MECHANICAL VENTILATION
· Produce the following HERS Certifications for the passing HVAC System(s):
· CF2R MCH-01
· CF3R MCH-20
· CF3R MCH-22
· CF3R MCH-23
· CF3R MCH-27
· Register all certificates with CalCERTS and provide copies for permit final` },

"Insulation": { title: "Insulation", docTitle: "INSULATION PROPOSAL", obs: false, scope:
`CRAWLSPACE / ATTIC INSULATION:
· Seal all Electrical and Plumbing Penetrations in the subfloor of the home with Polyurethane Fire-Rated Spray Foam
· Install R-19 Fiberglass Batting Insulation in between the floor joists, covering the specified areas
· Secure the insulation in place per manufacturer specification
· Ensure all work complies with the {CITY} City Codes & Regulations
· Clean up the work area and remove all debris and materials upon completion` },
};

/* =============== HELPERS =============== */
const $ = (id) => document.getElementById(id);
function toast(msg, ms = 2600) { const s = $("statusBar"); s.textContent = msg; s.style.display = "block"; clearTimeout(s._t); s._t = setTimeout(() => s.style.display = "none", ms); }
async function api(path, opts = {}) {
  const res = await fetch(`${API}/${path}`, { ...opts, headers: { "Content-Type": "application/json", "X-Access-Code": ACCESS, ...(opts.headers || {}) } });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "Request failed");
  return data;
}
function fmt(n) { return n == null ? "—" : "$" + Number(n).toLocaleString("en-US", { maximumFractionDigits: 0 }); }

/* =============== GATE =============== */
async function unlock() {
  ACCESS = $("gateCode").value.trim();
  try { await api("jobs?action=next-number"); sessionStorage.setItem("arkay_code", ACCESS); $("gate").style.display = "none"; init(); }
  catch { toast("Invalid access code"); }
}
if (ACCESS) { $("gate").style.display = "none"; init(); }

/* =============== INIT =============== */
async function init() {
  $("fDate").value = new Date().toISOString().slice(0, 10);
  const sel = $("fJobType");
  Object.keys(TEMPLATES).forEach((k) => { const o = document.createElement("option"); o.value = o.textContent = k; sel.appendChild(o); });
  EQUIPMENT.forEach((e) => { const b = document.createElement("button"); b.textContent = e.label; b.onclick = () => { $("fScope").value += ($("fScope").value ? "\n" : "") + e.text; }; $("equipChips").appendChild(b); });
  try { const { next_number } = await api("jobs?action=next-number"); $("fNum").value = next_number; } catch (e) { toast("Numbering offline: " + e.message); }
  loadJobs();
}

function setDocType(t) {
  DOC_TYPE = t;
  $("tgP").classList.toggle("on", t === "Proposal");
  $("tgI").classList.toggle("on", t === "Invoice");
}
function showTab(t) {
  ["New", "Jobs", "Dash"].forEach((x) => { $("view" + x).classList.add("hidden"); $("tab" + x).classList.remove("active"); });
  $("view" + { new: "New", jobs: "Jobs", dash: "Dash" }[t]).classList.remove("hidden");
  $("tab" + { new: "New", jobs: "Jobs", dash: "Dash" }[t]).classList.add("active");
  if (t === "dash") renderDash();
}

/* =============== TEMPLATE AUTO-FILL + PRICE INTEL =============== */
function applyTemplate() {
  const t = TEMPLATES[$("fJobType").value];
  if (!t) return;
  const ton = $("fTon").value !== "—" ? $("fTon").value : "[TONNAGE]";
  const sys = $("fSys").value;
  const city = $("fCity").value || "[CITY]";
  const ahModel = ton === "4" ? "45MUAAQ48XX3" : ton === "5" ? "45MUAAQ60XX3" : "[AIR HANDLER MODEL]";
  const hpModel = ton === "4" ? "37MURAQ48" : ton === "5" ? "37MURAQ60" : "[HEAT PUMP MODEL]";
  $("fScope").value = t.scope.replaceAll("{TON}", ton).replaceAll("{CITY}", city).replaceAll("{SYS}", sys).replaceAll("{AH_MODEL}", ahModel).replaceAll("{HP_MODEL}", hpModel);
  $("obsWrap").classList.toggle("hidden", !t.obs);
  if (t.obs) $("fObs").value = t.observation;
  if (t.docTitle.includes("INVOICE")) setDocType("Invoice");
  priceIntel($("fJobType").value);
}

async function priceIntel(jobType) {
  const box = $("intel"); box.classList.remove("hidden"); box.innerHTML = "Checking similar jobs…";
  try {
    const d = await api(`jobs?action=similar&job_type=${encodeURIComponent(jobType)}`);
    if (!d.count) { box.innerHTML = "💰 No priced history for this job type yet."; return; }
    box.innerHTML = `💰 <b>${d.count} similar jobs</b> — median <b>${fmt(d.median)}</b> (range ${fmt(d.low)}–${fmt(d.high)})` +
      `<div class="rec">Recent: ${d.recent.map((r) => `${r.property_address.split(",")[0]} ${fmt(r.amount)}`).join(" · ")}</div>`;
  } catch (e) { box.innerHTML = "Price intel unavailable: " + e.message; }
}

/* =============== VOICE =============== */
let recog = null, recording = false, transcript = "";
function toggleMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast("Voice not supported in this browser — type notes and hit AI Clean-Up"); return; }
  if (recording) { recog.stop(); return; }
  recog = new SR(); recog.continuous = true; recog.interimResults = true; recog.lang = "en-US";
  transcript = "";
  recog.onresult = (e) => { transcript = Array.from(e.results).map((r) => r[0].transcript).join(" "); $("micLabel").textContent = "Listening… tap to finish: " + transcript.slice(-60); };
  recog.onend = async () => {
    recording = false; $("micBtn").classList.remove("rec"); $("micLabel").textContent = "Dictate from the job site — AI drafts it in Arkay style";
    if (transcript.trim()) await draftScope(transcript);
  };
  recog.start(); recording = true; $("micBtn").classList.add("rec"); $("micLabel").textContent = "Listening… tap to finish";
}
async function draftScope(notes) {
  toast("✨ Drafting scope in Arkay style…", 8000);
  try {
    const d = await api("scope", { method: "POST", body: JSON.stringify({ action: "draft", text: notes, docType: DOC_TYPE, jobType: $("fJobType").value }) });
    $("fScope").value = d.scope;
    if (d.observation) { $("obsWrap").classList.remove("hidden"); $("fObs").value = d.observation; }
    toast("Scope drafted — review and edit");
  } catch (e) { toast("AI error: " + e.message); }
}
function draftFromNotes() { const t = $("fScope").value.trim(); if (!t) return toast("Type rough notes in the scope box first"); draftScope(t); }
async function translateScope() {
  const t = $("fScope").value.trim(); if (!t) return toast("Nothing to translate");
  toast("🇪🇸 Translating…", 8000);
  try { const d = await api("scope", { method: "POST", body: JSON.stringify({ action: "translate", text: t, docType: DOC_TYPE }) }); $("fScope").value = d.scope; $("scopeLang").textContent = "(Español)"; toast("Translated"); }
  catch (e) { toast("AI error: " + e.message); }
}

/* =============== PREVIEW + GENERATE =============== */
function docTitle() { const t = TEMPLATES[$("fJobType").value]; if (DOC_TYPE === "Invoice") return ($("fJobType").value === "HERS Testing & Certificate Production") ? "HERS INVOICE" : "INVOICE"; return t ? t.docTitle : "PROPOSAL"; }
function fullAddress() { return [$("fAddr").value, $("fCity").value ? $("fCity").value + ", CA" : ""].filter(Boolean).join(", "); }
function amountStr() { const a = parseFloat($("fAmount").value); return isNaN(a) ? "$0.00" : "$" + a.toLocaleString("en-US", { minimumFractionDigits: 2 }); }

function preview() {
  const t = TEMPLATES[$("fJobType").value] || {};
  const hasObs = !$("obsWrap").classList.contains("hidden") && $("fObs").value.trim();
  $("docPreview").innerHTML = `
    <div class="dhead"><img src="assets/logo.png"><div><div class="dtitle">${docTitle()}</div><div class="dsub">${t.title || $("fJobType").value || ""}</div></div></div>
    <div class="addr"><span>1999 S. Bascom Avenue, Suite 700, Campbell, CA 95008&nbsp; | &nbsp;Tel: (408) 218-7956</span><span>License # 1006157</span></div>
    <table class="info">
      <tr><td>${DOC_TYPE} No:</td><td>${$("fNum").value}</td></tr>
      <tr><td>Date:</td><td>${new Date($("fDate").value + "T12:00").toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" })}</td></tr>
      <tr><td>Client Name:</td><td>${$("fClient").value || "—"}</td></tr>
      <tr><td>Property Address:</td><td>${fullAddress() || "—"}</td></tr>
    </table>
    ${hasObs ? `<div class="bar">OBSERVATION AND RECOMMENDATION</div><div class="box">${$("fObs").value}</div>` : ""}
    <div class="bar">${DOC_TYPE === "Invoice" ? "DESCRIPTION OF WORK" : "SCOPE OF WORK"}</div>
    <div class="box">${$("fScope").value || "—"}</div>
    <div class="bar">${DOC_TYPE === "Invoice" ? "AMOUNT DUE" : "TOTAL INVESTMENT"}</div>
    <div class="tot"><div>${DOC_TYPE === "Invoice" ? "Amount Due" : "Total Investment"}</div><div>${amountStr()}</div></div>
    <div class="note">${DOC_TYPE === "Invoice" ? "Amount due includes ALL labor and materials for the work described above.<br>Thank you for your business — payment is appreciated within 15 days of the invoice date." : "Total investment includes ALL labor and materials necessary to complete the scope of work listed above."}</div>
    <div class="thanks"><span>THANK YOU</span> — Arkay Energy Solutions</div>
    <div class="badges"><img src="assets/badge_calcerts.png"><img src="assets/badge_bpi.png"><img src="assets/badge_energyupgrade.png"><img src="assets/badge_bca.png"></div>
    <div class="dfoot">Arkay Energy Solutions&nbsp; | &nbsp;General & Mechanical Contractor, Certified Title-24 HVAC Testing&nbsp; | &nbsp;Campbell, CA<br><i>This ${DOC_TYPE.toLowerCase()} is confidential and intended for the named property. Reproduction without consent is prohibited.</i></div>`;
  $("previewWrap").classList.remove("hidden");
  $("docPreview").scrollIntoView({ behavior: "smooth" });
}

function filename(ext) {
  const short = ($("fAddr").value || "Document").replace(/(Drive|Avenue|Street|Road|Court|Way|Boulevard)/i, (m) => ({ Drive: "Dr", Avenue: "Ave", Street: "St", Road: "Rd", Court: "Ct", Way: "Way", Boulevard: "Blvd" }[m] || m)).trim();
  return `${short}- ${DOC_TYPE} No.${$("fNum").value}.${ext}`;
}

async function generate(kind) {
  preview();
  toast("Generating…", 10000);
  try {
    let blob;
    if (kind === "pdf") {
      blob = await html2pdf().set({ margin: [10, 10], filename: filename("pdf"), image: { type: "jpeg", quality: 0.95 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: "mm", format: "letter" }, pagebreak: { mode: ["css", "avoid-all"] } }).from($("docPreview")).outputPdf("blob");
    } else {
      const isInv = DOC_TYPE === "Invoice";
      const tplPath = isInv ? "templates/Arkay_Invoice_Template.docx" : "templates/Arkay_Proposal_Template.docx";
      const buf = await (await fetch(tplPath)).arrayBuffer();
      const zip = new PizZip(buf);
      const doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true, nullGetter: () => "", delimiters: { start: "{{", end: "}}" } });
      const t = TEMPLATES[$("fJobType").value] || {};
      const hasObs = !$("obsWrap").classList.contains("hidden") && $("fObs").value.trim();
      const dateStr = new Date($("fDate").value + "T12:00").toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
      doc.render(isInv ? {
        Title: t.title || $("fJobType").value, InvoiceNo: $("fNum").value, Date: dateStr,
        ClientName: $("fClient").value, PropertyAddress: fullAddress(),
        DescriptionOfWork: $("fScope").value, AmountDue: amountStr(),
      } : {
        DocTitle: docTitle(), Title: t.title || $("fJobType").value, NoLabel: "Proposal No", DocNo: $("fNum").value,
        Date: dateStr, ClientName: $("fClient").value, PropertyAddress: fullAddress(),
        HasObservation: !!hasObs, Observation: $("fObs").value,
        ScopeOfWork: $("fScope").value, TotalInvestment: amountStr(),
        Notes: [],
      });
      blob = doc.getZip().generate({ type: "blob", mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" });
    }
    // download
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = filename(kind === "pdf" ? "pdf" : "docx"); a.click();
    // save record + Dropbox
    await saveRecord();
    dropboxSave(blob, kind === "pdf" ? "pdf" : "docx");
    toast("✅ Generated, logged & saving to Dropbox");
  } catch (e) { toast("Error: " + e.message, 5000); }
}

async function saveRecord() {
  try {
    await api("jobs", { method: "POST", body: JSON.stringify({
      doc_number: $("fNum").value, doc_type: DOC_TYPE, client: $("fClient").value,
      property_address: fullAddress(), city: $("fCity").value, job_type: $("fJobType").value,
      amount: parseFloat($("fAmount").value) || null, doc_date: $("fDate").value,
      scope_text: $("fScope").value, language: $("scopeLang").textContent ? "es" : "en",
      converted_from: window._convertedFrom || null,
    }) });
    loadJobs();
  } catch (e) { if (!e.message.includes("duplicate")) toast("Log warning: " + e.message, 4000); }
}

function dropboxSave(blob, ext) {
  const r = new FileReader();
  r.onload = async () => {
    try { await api("dropbox", { method: "POST", body: JSON.stringify({ filename: filename(ext), fileBase64: r.result.split(",")[1], docType: DOC_TYPE }) }); }
    catch (e) { toast("Dropbox: " + e.message, 4000); }
  };
  r.readAsDataURL(blob);
}

/* =============== JOBS + CONVERT =============== */
async function loadJobs() { try { const d = await api("jobs?action=list"); ALL_JOBS = d.jobs; renderJobs(); } catch (e) {} }
function renderJobs() {
  const q = ($("jobSearch").value || "").toLowerCase();
  $("jobsBody").innerHTML = ALL_JOBS
    .filter((j) => !q || `${j.doc_number} ${j.client} ${j.property_address}`.toLowerCase().includes(q))
    .slice(0, 80)
    .map((j) => `<tr><td>${j.doc_number}</td><td><span class="pill ${j.doc_type[0]}">${j.doc_type[0]}</span></td>
      <td><b>${j.client || "—"}</b><br><span style="color:#777">${j.property_address || ""}</span></td>
      <td>${fmt(j.amount)}</td>
      <td>${j.doc_type === "Proposal" ? `<button class="chips-btn" style="padding:6px 10px;border:1.5px solid var(--green);background:var(--light);border-radius:8px;font-weight:700;color:var(--green-dark)" onclick='convert(${JSON.stringify(j.doc_number)})'>→ Invoice</button>` : ""}</td></tr>`).join("");
}
async function convert(docNumber) {
  const j = ALL_JOBS.find((x) => x.doc_number === docNumber); if (!j) return;
  setDocType("Invoice");
  const full = ALL_JOBS.find((x) => x.doc_number === docNumber);
  $("fClient").value = j.client || ""; 
  const parts = (j.property_address || "").split(", ");
  $("fAddr").value = parts.slice(0, -1).join(", ") || j.property_address; $("fCity").value = (j.city || "").replace(", CA", "");
  $("fAmount").value = j.amount || ""; $("fJobType").value = j.job_type || "";
  $("fDate").value = new Date().toISOString().slice(0, 10);
  window._convertedFrom = j.doc_number;
  try { const { next_number } = await api("jobs?action=next-number"); $("fNum").value = next_number; } catch (e) {}
  // pull scope from the original record
  const rec = ALL_JOBS.find((x) => x.doc_number === docNumber);
  if (rec && rec.scope_text) $("fScope").value = rec.scope_text;
  showTab("new"); toast(`Converting ${docNumber} → Invoice`);
}

/* =============== DASHBOARD =============== */
function renderDash() {
  const props = ALL_JOBS.filter((j) => j.doc_type === "Proposal");
  const invs = ALL_JOBS.filter((j) => j.doc_type === "Invoice");
  const openProps = props.filter((p) => !ALL_JOBS.some((i) => i.converted_from === p.doc_number) && p.status !== "historical");
  const unpaid = invs.filter((i) => i.status === "sent");
  const sum = (arr) => arr.reduce((s, j) => s + (Number(j.amount) || 0), 0);
  $("statGrid").innerHTML = `
    <div class="stat"><div class="n">${fmt(sum(props))}</div><div class="l">Proposals (${props.length})</div></div>
    <div class="stat"><div class="n">${fmt(sum(invs))}</div><div class="l">Invoices (${invs.length})</div></div>
    <div class="stat"><div class="n">${openProps.length}</div><div class="l">Open Proposals</div></div>
    <div class="stat"><div class="n">${unpaid.length}</div><div class="l">Unpaid Invoices</div></div>`;
  const byType = {};
  ALL_JOBS.forEach((j) => { if (j.job_type) { byType[j.job_type] = byType[j.job_type] || { n: 0, v: 0 }; byType[j.job_type].n++; byType[j.job_type].v += Number(j.amount) || 0; } });
  $("byType").innerHTML = "<label>Jobs by Type</label>" + Object.entries(byType).sort((a, b) => b[1].v - a[1].v)
    .map(([k, v]) => `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee;font-size:14px"><span>${k} <span style="color:#999">(${v.n})</span></span><b>${fmt(v.v)}</b></div>`).join("");
}
</script>
